syntax ="proto3";
package example;
option cc_generic_services=true;//告诉 Thrift：为 C++ 生成通用服务代码

message EchoRequest{
    string request=1;
}

message EchoResponse{
    string response=1;
}

//定义RPC远端方法
//定义一个名为 EchoService 的 RPC 服务。
service EchoService{
    rpc Echo(EchoRequest) returns(EchoResponse);
}